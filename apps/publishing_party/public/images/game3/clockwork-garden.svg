<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <!-- sky -->
  <rect width="600" height="300" fill="#1a1a2e"/>
  <!-- ground -->
  <rect y="220" width="600" height="80" fill="#2a1a0e"/>
  <!-- brass path -->
  <ellipse cx="300" cy="240" rx="80" ry="20" fill="#b8860b" opacity="0.6"/>
  <rect x="270" y="220" width="60" height="80" fill="#b8860b" opacity="0.4"/>

  <!-- copper fountain base -->
  <ellipse cx="300" cy="225" rx="30" ry="8" fill="#b87333"/>
  <rect x="295" y="185" width="10" height="40" fill="#b87333"/>
  <ellipse cx="300" cy="185" rx="18" ry="6" fill="#cd853f"/>
  <!-- sparks -->
  <circle cx="300" cy="175" r="2" fill="#ffd700" opacity="0.9"/>
  <circle cx="295" cy="168" r="1.5" fill="#ffd700" opacity="0.8"/>
  <circle cx="306" cy="165" r="1" fill="#ffd700" opacity="0.7"/>
  <circle cx="292" cy="160" r="1" fill="#ffa500" opacity="0.6"/>
  <circle cx="308" cy="158" r="1.5" fill="#ffd700" opacity="0.5"/>

  <!-- left mechanical flower -->
  <rect x="138" y="180" width="4" height="50" fill="#b87333"/>
  <!-- petals (gear-like) -->
  <g transform="translate(140,178)">
    <ellipse rx="12" ry="5" fill="#cd853f" transform="rotate(0)"/>
    <ellipse rx="12" ry="5" fill="#cd853f" transform="rotate(45)"/>
    <ellipse rx="12" ry="5" fill="#cd853f" transform="rotate(90)"/>
    <ellipse rx="12" ry="5" fill="#cd853f" transform="rotate(135)"/>
    <circle r="6" fill="#b8860b"/>
    <circle r="3" fill="#2a1a0e"/>
  </g>

  <!-- center-left flower -->
  <rect x="198" y="185" width="4" height="45" fill="#b87333"/>
  <g transform="translate(200,183)">
    <ellipse rx="11" ry="5" fill="#a0522d" transform="rotate(22)"/>
    <ellipse rx="11" ry="5" fill="#a0522d" transform="rotate(67)"/>
    <ellipse rx="11" ry="5" fill="#a0522d" transform="rotate(112)"/>
    <ellipse rx="11" ry="5" fill="#a0522d" transform="rotate(157)"/>
    <circle r="5" fill="#b8860b"/>
    <circle r="2.5" fill="#2a1a0e"/>
  </g>

  <!-- right flower -->
  <rect x="398" y="182" width="4" height="48" fill="#b87333"/>
  <g transform="translate(400,180)">
    <ellipse rx="13" ry="5" fill="#cd853f" transform="rotate(15)"/>
    <ellipse rx="13" ry="5" fill="#cd853f" transform="rotate(60)"/>
    <ellipse rx="13" ry="5" fill="#cd853f" transform="rotate(105)"/>
    <ellipse rx="13" ry="5" fill="#cd853f" transform="rotate(150)"/>
    <circle r="6" fill="#b8860b"/>
    <circle r="3" fill="#2a1a0e"/>
  </g>

  <!-- far-right flower -->
  <rect x="458" y="188" width="4" height="42" fill="#b87333"/>
  <g transform="translate(460,186)">
    <ellipse rx="10" ry="4" fill="#a0522d" transform="rotate(30)"/>
    <ellipse rx="10" ry="4" fill="#a0522d" transform="rotate(75)"/>
    <ellipse rx="10" ry="4" fill="#a0522d" transform="rotate(120)"/>
    <ellipse rx="10" ry="4" fill="#a0522d" transform="rotate(165)"/>
    <circle r="5" fill="#b8860b"/>
    <circle r="2.5" fill="#2a1a0e"/>
  </g>

  <!-- large bg gear left -->
  <g transform="translate(60,120)" opacity="0.25">
    <circle r="55" fill="none" stroke="#b87333" stroke-width="6"/>
    <circle r="42" fill="none" stroke="#b87333" stroke-width="3"/>
    <circle r="10" fill="#b87333"/>
    <line x1="0" y1="-55" x2="0" y2="55" stroke="#b87333" stroke-width="3"/>
    <line x1="-55" y1="0" x2="55" y2="0" stroke="#b87333" stroke-width="3"/>
    <line x1="-39" y1="-39" x2="39" y2="39" stroke="#b87333" stroke-width="3"/>
    <line x1="39" y1="-39" x2="-39" y2="39" stroke="#b87333" stroke-width="3"/>
  </g>

  <!-- large bg gear right -->
  <g transform="translate(540,100)" opacity="0.2">
    <circle r="48" fill="none" stroke="#cd853f" stroke-width="5"/>
    <circle r="36" fill="none" stroke="#cd853f" stroke-width="2.5"/>
    <circle r="9" fill="#cd853f"/>
    <line x1="0" y1="-48" x2="0" y2="48" stroke="#cd853f" stroke-width="2.5"/>
    <line x1="-48" y1="0" x2="48" y2="0" stroke="#cd853f" stroke-width="2.5"/>
    <line x1="-34" y1="-34" x2="34" y2="34" stroke="#cd853f" stroke-width="2.5"/>
    <line x1="34" y1="-34" x2="-34" y2="34" stroke="#cd853f" stroke-width="2.5"/>
  </g>

  <!-- small floating gear -->
  <g transform="translate(300,60)" opacity="0.35">
    <circle r="22" fill="none" stroke="#ffd700" stroke-width="3"/>
    <circle r="4" fill="#ffd700"/>
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#ffd700" stroke-width="2"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#ffd700" stroke-width="2"/>
    <line x1="-16" y1="-16" x2="16" y2="16" stroke="#ffd700" stroke-width="2"/>
    <line x1="16" y1="-16" x2="-16" y2="16" stroke="#ffd700" stroke-width="2"/>
  </g>

  <!-- caption -->
  <text x="300" y="282" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#b8860b" opacity="0.8">The Clockwork Garden</text>
</svg>
